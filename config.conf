base {
  ##### PROMPTING MODEL #####
  "reasoning_model" = "nemotron-3-nano:30b-a3b-fp16" # "deepseek-r1:70b-llama-distill-q4_K_M"
  "output_model" = "gemma3:4b"
  "cluster_model" = "sentence-transformers/all-MiniLM-L6-v2"
  "pretrained_model" = "roberta-base"
  "seed" = 42
  "temperature" = 0.0
  "num_ctx" = 14336
  "event_chain_num_threshold" = 30
}

mfc_immigration = ${base}{
  ##### DATA #####
  "output_path" = "./data/mfc/immigration/"
  "relations_path" = "./data/mfc/immigration/mfc_immigration_processed_corpus_relations_2000.pkl"
  "event_chains_path" = "./data/mfc/immigration/mfc_immigration_event_chains.pickle"
  "char_event_chains_path" = "./data/mfc/immigration/mfc_immigration_char_event_chains.pickle"
  "chain_char_annotations_path" = "./data/mfc/immigration/mfc_immigration_chain_char_annotations.csv"
  "processed_chains_path" = "./data/mfc/immigration/mfc_immigration_processed_event_chains.pickle"
  "constraints_flat_path" = "./data/mfc/immigration/mfc_immigration_constraints_flat.db"
  "constraints_graph_path" = "./data/mfc/immigration/mfc_immigration_constraints_graph.db"
  "clusters_path" = "./data/mfc/immigration/clustering/"
  "cluster_analysis_path" = "./data/mfc/immigration/clustering/mfc_immigration_cluster_analysis.pickle"
  "cluster_eval_path" = "./data/mfc/immigration/clustering/clusters_150_0.01_.pickle"
  "frame_prediction_data_path" = "./data/mfc/immigration/frame_prediction/"
  
  ##### MODEL PARAMETERS #####
  "num_classes" = 14
  "batch_size" = 32
  "lr" = 1e-5
  "weight_decay" = 0.2
  "epochs" = 35
  "patience" = 3
  "min_delta" = 0.3
  "num_clusters" = 150
  "num_char_feats" = 20
  "use_cluster_feats" = false
  "use_all_feats" = false
}

